  <!-- manter layout correto quando menu estiver colapsado -->
  <style>
    /* ho.ko fix — manter layout correto quando menu estiver colapsado */
    @media (min-width: 1200px) {

      /* Quando estiver colapsado, a página precisa continuar “respeitando” 5.25rem */
      html.layout-menu-fixed.layout-menu-collapsed .layout-page,
      html.layout-menu-fixed-offcanvas.layout-menu-collapsed .layout-page {
        padding-left: 5.25rem;
      }

      /* Navbar fixa também precisa acompanhar */
      html.layout-navbar-fixed.layout-menu-collapsed .layout-content-navbar:not(.layout-without-menu) .layout-navbar,
      html.layout-menu-fixed.layout-navbar-fixed.layout-menu-collapsed .layout-content-navbar:not(.layout-without-menu) .layout-navbar,
      html.layout-menu-fixed-offcanvas.layout-navbar-fixed.layout-menu-collapsed .layout-content-navbar:not(.layout-without-menu) .layout-navbar {
        left: 5.25rem;
      }

      /* Footer fixo também */
      html.layout-footer-fixed.layout-menu-collapsed .layout-wrapper:not(.layout-without-menu) .content-footer {
        left: 5.25rem;
      }
    }
  </style>
  <style>
    .kb-toolbar {
      display: grid;
      grid-template-columns: 2fr repeat(3, 1fr) auto;
      gap: 12px;
    }

    .kb-board-scroll {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .kb-board {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      min-height: 500px;
    }

    .kb-column {
      flex: 0 0 330px;
    }

    .kb-column-card {
      border: 1px solid rgba(67, 89, 113, .12);
      border-radius: 14px;
      background: #fff;
    }

    .kb-column-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(67, 89, 113, .08);
    }

    .kb-column-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }

    .kb-column-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .kb-dropzone {
      min-height: 180px;
      padding: 12px;
    }

    .kb-dropzone.kb-over {
      background: rgba(105, 108, 255, .06);
      outline: 2px dashed rgba(105, 108, 255, .35);
      outline-offset: -8px;
      border-radius: 12px;
    }

    .kb-card {
      border: 1px solid rgba(67, 89, 113, .12);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      margin-bottom: 12px;
      cursor: grab;
      box-shadow: 0 4px 12px rgba(67, 89, 113, .06);
    }

    .kb-card-title {
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .kb-card-meta {
      font-size: .8rem;
      color: #8592a3;
    }

    .kb-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: .72rem;
      font-weight: 600;
    }

    .kb-chip-soft {
      background: #f5f5f9;
      color: #566a7f;
    }

    .kb-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .72rem;
      font-weight: 600;
      color: #fff;
    }

    .kb-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
    }

    .kb-assignees {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .kb-empty {
      border: 1px dashed rgba(67, 89, 113, .20);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #8592a3;
      background: rgba(67, 89, 113, .03);
    }

    .kb-side-list {
      max-height: 420px;
      overflow: auto;
    }

    .kb-comment {
      border: 1px solid rgba(67, 89, 113, .12);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .kb-color-input {
      width: 44px;
      height: 38px;
      padding: 4px;
    }

    .kb-role-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    @media (max-width: 1200px) {
      .kb-toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 768px) {
      .kb-toolbar {
        grid-template-columns: 1fr;
      }

      .kb-column {
        flex-basis: 280px;
      }

      .kb-role-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
