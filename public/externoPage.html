<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Cliente | ho.ko</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Inter',sans-serif; background:#f5f5f9; color:#1f2937; }
    .wrap { max-width:1200px; margin:0 auto; padding:24px; }
    .header { background:#fff; border:1px solid #e7e7ef; border-radius:16px; padding:20px; margin-bottom:20px; }
    .title { font-size:1.4rem; font-weight:700; margin:0 0 8px; }
    .muted { color:#6b7280; }
    .grid { display:grid; grid-template-columns: 360px 1fr; gap:20px; }
    .card { background:#fff; border:1px solid #e7e7ef; border-radius:16px; padding:18px; }
    .list { display:flex; flex-direction:column; gap:12px; max-height:70vh; overflow:auto; }
    .item { border:1px solid #ececf4; border-radius:12px; padding:14px; cursor:pointer; background:#fff; }
    .item.active { border-color:#696cff; box-shadow:0 0 0 3px rgba(105,108,255,.12); }
    .badge { display:inline-flex; padding:4px 8px; border-radius:999px; background:#f5f5f9; color:#566a7f; font-size:.75rem; font-weight:600; }
    .comment { border:1px solid #ececf4; border-radius:12px; padding:12px; margin-bottom:10px; background:#fafafd; }
    textarea { width:100%; min-height:110px; padding:12px; border:1px solid #d9dbe8; border-radius:12px; font:inherit; }
    button { border:none; border-radius:12px; padding:12px 16px; cursor:pointer; font:inherit; font-weight:600; }
    .btn-primary { background:#696cff; color:#fff; }
    .empty { color:#6b7280; padding:20px; border:1px dashed #d9dbe8; border-radius:12px; text-align:center; }
    @media (max-width: 900px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1 class="title">Portal do cliente</h1>
      <div class="muted" id="client-name">Carregando...</div>
    </div>

    <div class="grid">
      <div class="card">
        <h3 style="margin-top:0">Conteúdos em andamento</h3>
        <div id="cards-list" class="list"></div>
      </div>

      <div class="card">
        <div id="card-empty" class="empty">Selecione um card para visualizar a copy e enviar comentários.</div>
        <div id="card-detail" style="display:none">
          <h2 id="detail-title" style="margin-top:0"></h2>
          <div class="muted" id="detail-meta" style="margin-bottom:14px"></div>
          <div style="margin-bottom:16px">
            <div style="font-size:.85rem; font-weight:700; margin-bottom:8px">Copy</div>
            <div id="detail-copy" style="white-space:pre-wrap; line-height:1.6"></div>
          </div>
          <div style="margin-bottom:16px">
            <div style="font-size:.85rem; font-weight:700; margin-bottom:8px">Comentários</div>
            <div id="detail-comments"></div>
          </div>
          <div>
            <div style="font-size:.85rem; font-weight:700; margin-bottom:8px">Enviar comentário</div>
            <textarea id="comment-body" placeholder="Escreva aqui o feedback do cliente..."></textarea>
            <div style="margin-top:12px; display:flex; justify-content:flex-end"><button id="send-comment" class="btn-primary">Enviar comentário</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';
  let cards = [];
  let selectedId = null;

  async function api(path, opts = {}) {
    const res = await fetch(path, {
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
      ...opts,
    });
    const data = res.status === 204 ? null : await res.json();
    if (!res.ok || data?.success === false) throw new Error(data?.message || 'Erro');
    return data;
  }

  function fmtDate(v) {
    if (!v) return 'Sem prazo';
    const d = new Date(v);
    return Number.isNaN(d.getTime()) ? 'Sem prazo' : d.toLocaleDateString('pt-BR');
  }

  function renderCards(profile) {
    document.getElementById('client-name').textContent = profile?.client_name || 'Cliente';
    const list = document.getElementById('cards-list');
    list.innerHTML = cards.length ? cards.map(card => `
      <button type="button" class="item ${card.id === selectedId ? 'active' : ''}" data-id="${card.id}">
        <div style="display:flex; justify-content:space-between; gap:10px; align-items:flex-start; text-align:left">
          <strong>${card.title}</strong>
          <span class="badge">${card.week || 'S1'}</span>
        </div>
        <div class="muted" style="margin-top:6px">${card.column_name || 'Sem coluna'} • Prazo: ${fmtDate(card.due_date)}</div>
      </button>
    `).join('') : '<div class="empty">Nenhum card disponível para este cliente.</div>';

    Array.from(list.querySelectorAll('[data-id]')).forEach(btn => {
      btn.onclick = () => loadCard(btn.dataset.id);
    });
  }

  function renderDetail(card) {
    document.getElementById('card-empty').style.display = card ? 'none' : 'block';
    document.getElementById('card-detail').style.display = card ? 'block' : 'none';
    if (!card) return;
    document.getElementById('detail-title').textContent = card.title || '';
    document.getElementById('detail-meta').textContent = `${card.week || 'S1'} • Prazo: ${fmtDate(card.due_date)}`;
    document.getElementById('detail-copy').textContent = card.copy_text || 'Sem copy cadastrada.';
    const comments = document.getElementById('detail-comments');
    const list = card.client_comments || [];
    comments.innerHTML = list.length ? list.map(comment => `
      <div class="comment">
        <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:6px"><strong>${comment.author || 'Cliente'}</strong><span class="muted">${new Date(comment.created_at).toLocaleString('pt-BR')}</span></div>
        <div>${comment.text || ''}</div>
      </div>
    `).join('') : '<div class="empty">Sem comentários ainda.</div>';
  }

  async function loadBoard() {
    const data = await api(`/api/kanban/external/cards?token=${encodeURIComponent(token)}`);
    cards = data.cards || [];
    renderCards(data.profile);
    if (cards[0]) loadCard(cards[0].id);
  }

  async function loadCard(cardId) {
    selectedId = cardId;
    const data = await api(`/api/kanban/external/cards/${encodeURIComponent(cardId)}?token=${encodeURIComponent(token)}`);
    renderCards(data.profile);
    renderDetail(data.card);
  }

  document.getElementById('send-comment').onclick = async () => {
    const body = document.getElementById('comment-body').value.trim();
    if (!selectedId || !body) return;
    try {
      await api(`/api/kanban/external/cards/${encodeURIComponent(selectedId)}/comments`, {
        method: 'POST',
        body: JSON.stringify({ token, body }),
      });
      document.getElementById('comment-body').value = '';
      await loadCard(selectedId);
    } catch (e) {
      alert(e.message);
    }
  };

  loadBoard().catch(err => {
    document.getElementById('client-name').textContent = err.message;
    document.getElementById('cards-list').innerHTML = `<div class="empty">${err.message}</div>`;
  });
})();
</script>
</body>
</html>
