<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ativar Acesso</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 24px;
            max-width: 520px;
            margin: 0 auto;
        }

        .box {
            border: 1px solid #ddd;
            padding: 16px;
            border-radius: 10px;
        }

        label {
            display: block;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
        }

        button {
            margin-top: 16px;
            padding: 10px 14px;
            cursor: pointer;
            width: 100%;
        }

        .msg {
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <h2>Ativar acesso</h2>

    <div class="box">
        <div id="info" class="msg">Validando convite...</div>

        <form id="form" style="display:none;">
            <label>Nome (opcional)
                <input type="text" id="name" placeholder="Seu nome" />
            </label>

            <label>Nova senha
                <input type="password" id="password" required minlength="6" />
            </label>

            <label>Confirmar senha
                <input type="password" id="confirmPassword" required minlength="6" />
            </label>

            <button type="submit">Ativar</button>
            <div id="msg" class="msg"></div>
        </form>
    </div>

    <script>
        const info = document.getElementById('info');
        const form = document.getElementById('form');
        const msg = document.getElementById('msg');

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) info.textContent = 'Token ausente no link.';
        else {
            fetch(`/api/invites/validate?token=${encodeURIComponent(token)}`)
                .then(r => r.json().then(data => ({ ok: r.ok, data })))
                .then(({ ok, data }) => {
                    if (!ok || !data.success) {
                        info.textContent = data.message || 'Convite inválido.';
                        return;
                    }
                    info.textContent = `Convite para: ${data.invite.email}`;
                    form.style.display = 'block';
                })
                .catch(() => {
                    info.textContent = 'Erro ao validar convite.';
                });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.textContent = 'Enviando...';

            const payload = {
                token,
                name: document.getElementById('name').value || null,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };

            try {
                const r = await fetch('/api/invites/accept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await r.json();

                if (!r.ok || !data.success) {
                    msg.textContent = data.message || 'Erro ao ativar acesso.';
                    return;
                }

                msg.textContent = 'Acesso ativado! Redirecionando...';
                window.location.href = data.redirectTo || '/dashboardPage.html';
            } catch (err) {
                msg.textContent = 'Erro de rede.';
            }
        });
    </script>
</body>

</html>
